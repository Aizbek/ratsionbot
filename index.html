<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ratsion · правильное питание</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="lottie-player.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --green:#3FB069; --green-d:#2E8E52; --green-l:#EAF6EE;
  --amber:#F5A623; --amber-d:#E0921A;
  --bg:#F6F7F4; --card:#FFFFFF; --ink:#1F2A24; --muted:#8A938D;
  --line:rgba(31,42,36,.07); --shadow:0 10px 30px -12px rgba(31,42,36,.18);
  --shadow-lg:0 24px 50px -20px rgba(31,42,36,.28);
  --r:20px; --r-sm:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  overflow-x:hidden;line-height:1.45;-webkit-font-smoothing:antialiased;
}
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;overflow:hidden}

/* ---------- screen system ---------- */
.screen{position:absolute;inset:0;padding:0 18px 120px;overflow-y:auto;
  opacity:0;transform:translateX(40px) scale(.98);pointer-events:none;
  transition:opacity .45s cubic-bezier(.22,.61,.36,1),transform .45s cubic-bezier(.22,.61,.36,1);
  -webkit-overflow-scrolling:touch}
.screen.active{opacity:1;transform:none;pointer-events:auto}
.screen.back-exit{transform:translateX(40px) scale(.98)}

/* ---------- shared bits ---------- */
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;
  padding:16px 2px 14px;background:linear-gradient(180deg,var(--bg) 70%,rgba(246,247,244,0));backdrop-filter:blur(6px)}
.back-btn{width:42px;height:42px;border-radius:13px;border:1px solid var(--line);background:var(--card);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  transition:transform .2s,box-shadow .2s;box-shadow:0 2px 8px -4px rgba(31,42,36,.2)}
.back-btn:active{transform:scale(.92)}
.topbar h2{font-size:19px;font-weight:700;letter-spacing:-.02em}
.ic{width:22px;height:22px;display:inline-block;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle}

.card{background:var(--card);border-radius:var(--r);border:1px solid var(--line);box-shadow:var(--shadow)}

.cta{width:100%;border:none;border-radius:16px;padding:17px;font-family:inherit;font-size:16px;font-weight:700;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;letter-spacing:-.01em;
  position:relative;overflow:hidden;transition:transform .18s,box-shadow .25s}
.cta:active{transform:scale(.975)}
.cta-amber{background:linear-gradient(135deg,#FBB13C,var(--amber));box-shadow:0 12px 26px -10px rgba(245,166,35,.65)}
.cta-green{background:linear-gradient(135deg,#4CC079,var(--green));box-shadow:0 12px 26px -10px rgba(63,176,105,.55)}
.cta-ghost{background:transparent;color:var(--muted);font-weight:600;font-size:14px;box-shadow:none;padding:13px}
.cta::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.35),transparent);
  transform:skewX(-18deg);transition:left .7s}
.cta:not(.cta-ghost):hover::after{left:130%}

.fade-up{opacity:0;transform:translateY(18px);animation:fadeUp .6s forwards}
@keyframes fadeUp{to{opacity:1;transform:none}}
.d1{animation-delay:.05s}.d2{animation-delay:.13s}.d3{animation-delay:.21s}.d4{animation-delay:.29s}.d5{animation-delay:.37s}.d6{animation-delay:.45s}

/* ---------- WELCOME ---------- */
#welcome{padding-top:0;display:flex;flex-direction:column;min-height:100vh}
.hero{position:relative;margin:0 -18px;padding:64px 26px 50px;
  background:radial-gradient(120% 100% at 50% 0%,#54C683 0%,var(--green) 45%,var(--green-d) 100%);
  border-radius:0 0 34px 34px;overflow:hidden;color:#fff;text-align:center}
.hero::before,.hero::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,.09)}
.hero::before{width:240px;height:240px;top:-90px;right:-70px}
.hero::after{width:170px;height:170px;bottom:-70px;left:-50px}
.logo-badge{width:78px;height:78px;border-radius:24px;background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;
  backdrop-filter:blur(4px);box-shadow:0 14px 30px -12px rgba(0,0,0,.3)}
.logo-badge .ic{width:40px;height:40px;stroke-width:1.7}
.hero h1{font-size:30px;font-weight:800;letter-spacing:-.03em;position:relative}
.hero .sub{font-size:14px;opacity:.9;font-weight:500;margin-top:4px;letter-spacing:.04em;text-transform:uppercase;position:relative}
.welcome-body{flex:1;padding:26px 4px 0}
.welcome-body .lead{font-size:16px;color:var(--ink);font-weight:600;margin-bottom:18px;letter-spacing:-.01em}
.feat{display:flex;gap:13px;align-items:center;padding:14px 16px;margin-bottom:11px;background:var(--card);
  border-radius:var(--r-sm);border:1px solid var(--line);box-shadow:0 4px 14px -10px rgba(31,42,36,.3);
  transition:transform .25s,box-shadow .25s}
.feat:hover{transform:translateY(-3px);box-shadow:0 14px 26px -14px rgba(31,42,36,.35)}
.feat-ic{width:44px;height:44px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.feat-ic .ic{width:23px;height:23px}
.feat p{font-size:14.5px;font-weight:600;letter-spacing:-.01em}
.welcome-foot{position:sticky;bottom:0;padding:16px 0 26px;margin-top:14px;
  background:linear-gradient(180deg,rgba(246,247,244,0),var(--bg) 38%)}

/* ---------- MENU ---------- */
.m-hero{margin:0 -18px;padding:20px 20px 18px;text-align:center;background:#fff;
  box-shadow:0 6px 20px -14px rgba(31,42,36,.25)}
.m-hero-logo{width:42%;max-width:165px;height:auto;display:block;margin:0 auto}
.menu-logo-fallback{font-family:Georgia,serif;font-style:italic;font-size:40px;font-weight:500;
  background:linear-gradient(95deg,#E7C66B,#B08D3A);-webkit-background-clip:text;background-clip:text;color:transparent}
.m-body{padding-top:18px}

/* featured order tile */
.m-feature{position:relative;display:flex;align-items:center;gap:16px;padding:20px;border-radius:var(--r);overflow:hidden;cursor:pointer;
  background:linear-gradient(120deg,#4CC079,var(--green-d));color:#fff;box-shadow:0 18px 36px -16px rgba(63,176,105,.6);
  margin-bottom:13px;transition:transform .25s,box-shadow .25s}
.m-feature:hover{transform:translateY(-4px);box-shadow:0 26px 50px -18px rgba(63,176,105,.7)}
.m-feature:active{transform:scale(.98)}
.m-feature::before{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.12);top:-60px;right:-30px}
.m-feature .f-ic{width:58px;height:58px;border-radius:17px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.m-feature .f-ic .ic{width:30px;height:30px}
.m-feature .f-txt{position:relative;flex:1}
.m-feature h3{font-size:20px;font-weight:800;letter-spacing:-.02em}
.m-feature p{font-size:13px;opacity:.9;font-weight:500;margin-top:2px}
.m-feature .f-arrow{position:relative;opacity:.85}

/* 2x2 grid */
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.tile{position:relative;background:var(--card);border-radius:var(--r);border:1px solid var(--line);
  padding:18px 16px;cursor:pointer;overflow:hidden;box-shadow:var(--shadow);min-height:118px;isolation:isolate;
  display:flex;flex-direction:column;justify-content:space-between;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .28s}
.tile:active{transform:scale(.96)}
.tile:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg)}
/* sharp photo background + white wash at the bottom so dark text stays readable */
.tile.photo::before{content:'';position:absolute;inset:0;z-index:-2;
  background-image:var(--img);background-size:cover;background-position:center;
  filter:saturate(1.08);opacity:1}
.tile.photo::after{content:'';position:absolute;inset:0;z-index:-1;
  background:linear-gradient(180deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.14) 38%,rgba(255,255,255,.66) 70%,rgba(255,255,255,.92) 100%)}
.tile-ic{width:48px;height:48px;border-radius:15px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;
  box-shadow:0 6px 16px -8px rgba(31,42,36,.4)}
.tile-ic .ic{width:25px;height:25px}
.tile h3{font-size:16px;font-weight:700;letter-spacing:-.02em;text-shadow:0 1px 3px rgba(255,255,255,.95),0 2px 10px rgba(255,255,255,.85)}
.tile p{font-size:12px;color:#5a635d;font-weight:700;margin-top:3px;line-height:1.3;text-shadow:0 1px 3px rgba(255,255,255,.95),0 2px 10px rgba(255,255,255,.85)}

/* wide list row */
.m-row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:16px 18px;cursor:pointer;box-shadow:var(--shadow);transition:transform .25s,box-shadow .25s}
.m-row:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.m-row:active{transform:scale(.98)}
.m-row .r-ic{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.m-row h3{font-size:15px;font-weight:700;letter-spacing:-.01em}
.m-row p{font-size:12px;color:var(--muted);font-weight:500;margin-top:1px}
.m-row .r-arrow{margin-left:auto;color:var(--muted)}

/* color variants */
.v-green .tile-ic,.v-green .r-ic,.v-green.feat-ic{background:var(--green-l);color:var(--green-d)}
.v-green .glow{background:var(--green)}
.v-amber .tile-ic,.v-amber.feat-ic{background:#FDF1DD;color:var(--amber-d)}
.v-amber .glow{background:var(--amber)}
.v-blue .tile-ic,.v-blue.feat-ic{background:#E6F0FB;color:#2C6FB5}
.v-blue .glow{background:#3C82D6}
.v-pink .tile-ic,.v-pink.feat-ic{background:#FCEAF0;color:#C24C73}
.v-pink .glow{background:#D85A85}
.v-violet .tile-ic,.v-violet .r-ic,.v-violet.feat-ic{background:#EFEBFB;color:#6A52C2}
.v-violet .glow{background:#7E63D8}

/* program-list icons get their colour too */
.v-green .prog-ic{background:var(--green-l);color:var(--green-d)}
.v-amber .prog-ic{background:#FDF1DD;color:var(--amber-d)}
.v-blue .prog-ic{background:#E1EFFC;color:#2C6FB5}
.v-pink .prog-ic{background:#FCEAF0;color:#C24C73}
.v-violet .prog-ic{background:#EFEBFB;color:#6A52C2}
.v-teal .prog-ic{background:#DCF5EF;color:#0E9C84}
.v-orange .prog-ic{background:#FFE9D6;color:#E07A1A}
/* colorful light tints for the program / calorie cards (bright, never dark) */
.prog.v-green{background:#F2FBF5}
.prog.v-amber{background:#FFF9EF}
.prog.v-blue{background:#F1F7FE}
.prog.v-pink{background:#FEF4F8}
.prog.v-violet{background:#F8F5FD}
.prog.v-teal{background:#EEFBF7}
.prog.v-orange{background:#FFF6EE}

/* photo cards (real food images fill the whole tile) */
.ptile{position:relative;border-radius:var(--r);overflow:hidden;cursor:pointer;min-height:152px;
  box-shadow:var(--shadow);background-color:#EAE7DE;isolation:isolate;
  display:flex;flex-direction:column;justify-content:flex-end;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .28s}
.ptile:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg)}
.ptile:active{transform:scale(.97)}
/* fallback icon shown when the photo file isn't there yet (behind the image layer) */
.ptile-fallback{position:absolute;inset:0;z-index:0;display:flex;align-items:center;justify-content:center;border-radius:inherit}
.ptile-fallback .ic{width:46px;height:46px;opacity:.8}
.v-green.ptile-fallback{background:var(--green-l);color:var(--green-d)}
.v-amber.ptile-fallback{background:#FDF1DD;color:var(--amber-d)}
.v-pink.ptile-fallback{background:#FCEAF0;color:#C24C73}
.v-violet.ptile-fallback{background:#EFEBFB;color:#6A52C2}
/* the photo itself: a layer above the fallback. If the file 404s, this stays invisible
   (no background renders) and the fallback icon shows through. */
.ptile::before{content:'';position:absolute;inset:0;z-index:1;border-radius:inherit;
  background-image:var(--img);background-size:cover;background-position:center;background-repeat:no-repeat}
/* dark gradient so white text stays readable over any photo (stronger at the bottom third) */
.ptile-shade{position:absolute;inset:0;z-index:2;border-radius:inherit;
  background:linear-gradient(180deg,rgba(0,0,0,0) 30%,rgba(0,0,0,.30) 58%,rgba(0,0,0,.70) 82%,rgba(0,0,0,.80) 100%)}
.ptile-txt{position:relative;z-index:3;padding:16px}
.ptile-txt h3{font-size:17px;font-weight:800;letter-spacing:-.02em;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.55)}
.ptile-txt p{font-size:12px;font-weight:600;margin-top:2px;color:rgba(255,255,255,.92);text-shadow:0 1px 7px rgba(0,0,0,.55)}
/* gold logo used as the Контакты icon */
.tile-logo-ic{width:48px;height:48px;object-fit:contain;flex-shrink:0}

/* off-hours toast */
#offhours{position:fixed;top:14px;left:14px;right:14px;max-width:452px;margin:0 auto;z-index:900;
  display:flex;align-items:flex-start;gap:11px;padding:13px 15px;border-radius:14px;
  background:#FFF7E6;border:1px solid #F2DCA6;box-shadow:0 10px 28px -12px rgba(120,90,20,.35);
  transform:translateY(-130%);opacity:0;transition:transform .5s cubic-bezier(.22,.61,.36,1),opacity .5s}
#offhours.show{transform:none;opacity:1}
#offhours .oh-ic{color:var(--amber-d);flex-shrink:0;margin-top:1px}
#offhours .oh-ic .ic{width:20px;height:20px}
#offhours .oh-body b{font-size:13.5px;font-weight:700;color:#7A5E1A;display:block}
#offhours .oh-body span{font-size:12px;color:#9A7B2E;font-weight:500;line-height:1.4}
#offhours .oh-x{margin-left:auto;color:#C2A55A;font-size:18px;cursor:pointer;flex-shrink:0;line-height:1}

/* ---------- PREMIUM LOADING SCREEN (Lottie handwriting + brand) ---------- */
#loader{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(125% 90% at 50% 38%,#FFFDF8 0%,#FAF4E6 55%,#F1E6CC 100%);
  transition:opacity .7s ease,visibility .7s}
#loader.hide{opacity:0;visibility:hidden;pointer-events:none}
.ld-anim{display:flex;align-items:center;justify-content:center}
.ld-brand{margin-top:6px;font-family:Georgia,'Times New Roman',serif;font-weight:700;font-size:40px;letter-spacing:.01em;
  background:linear-gradient(95deg,#E7C66B,#B08D3A 50%,#D4AF52);-webkit-background-clip:text;background-clip:text;color:transparent;
  opacity:0;transform:translateY(10px);transition:opacity .9s ease,transform .9s ease}
.ld-brand.show{opacity:1;transform:none}
.ld-tag{margin-top:14px;font-size:11px;font-weight:700;letter-spacing:.36em;text-transform:uppercase;color:rgba(176,141,58,.75);
  opacity:0;transform:translateY(8px);transition:opacity .9s ease .15s,transform .9s ease .15s}
.ld-tag.show{opacity:1;transform:none}

/* ---------- CALCULATOR ---------- */
.progress-wrap{padding:6px 2px 18px}
.progress-track{height:7px;background:#E7EAE6;border-radius:99px;overflow:hidden}
.progress-bar{height:100%;width:16%;border-radius:99px;background:linear-gradient(90deg,var(--green),#54C683);
  transition:width .5s cubic-bezier(.22,.61,.36,1)}
.step-label{font-size:12px;color:var(--muted);font-weight:600;margin-top:9px;display:flex;justify-content:space-between}
.q{font-size:23px;font-weight:800;letter-spacing:-.03em;margin:6px 2px 22px;line-height:1.2}
.opt-grid{display:grid;gap:12px}
.opt-grid.two{grid-template-columns:1fr 1fr}
.opt{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r-sm);padding:18px 16px;cursor:pointer;
  display:flex;align-items:center;gap:13px;font-size:15px;font-weight:600;letter-spacing:-.01em;
  transition:transform .2s,border-color .2s,box-shadow .25s,background .2s;box-shadow:0 3px 12px -9px rgba(31,42,36,.3)}
.opt:hover{transform:translateY(-3px);box-shadow:0 14px 24px -14px rgba(31,42,36,.32)}
.opt:active{transform:scale(.97)}
.opt.sel{border-color:var(--green);background:var(--green-l)}
.opt.center{flex-direction:column;text-align:center;gap:9px;padding:22px 12px}
.opt .o-ic{width:42px;height:42px;border-radius:13px;background:var(--green-l);color:var(--green-d);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt .o-ic .ic{width:23px;height:23px}
.opt .o-sub{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:1px}
.num-field{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r-sm);padding:8px 18px;
  display:flex;align-items:center;gap:10px;transition:border-color .25s,box-shadow .25s}
.num-field:focus-within{border-color:var(--green);box-shadow:0 0 0 4px rgba(63,176,105,.13)}
.num-field input{flex:1;border:none;outline:none;font-family:inherit;font-size:34px;font-weight:800;color:var(--ink);
  background:transparent;width:100%;letter-spacing:-.03em}
.num-field input::placeholder{color:#C9CEC9}
.num-field .unit{font-size:15px;color:var(--muted);font-weight:700}
.slider-readout{text-align:center;margin:6px 0 20px}
.slider-readout b{font-size:46px;font-weight:800;letter-spacing:-.04em;color:var(--ink)}
.slider-readout span{font-size:16px;color:var(--muted);font-weight:600;margin-left:4px}
input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:99px;
  background:linear-gradient(90deg,var(--green) var(--p,40%),#E7EAE6 var(--p,40%));outline:none;margin:8px 0 4px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;
  background:#fff;border:5px solid var(--green);cursor:pointer;box-shadow:0 4px 12px -2px rgba(63,176,105,.5);transition:transform .15s}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.18)}
.range-ends{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:600}

/* result */
.result-hero{position:relative;margin:4px 0 14px;padding:30px 22px;border-radius:26px;text-align:center;color:#fff;overflow:hidden;
  background:radial-gradient(130% 120% at 50% 0%,#54C683,var(--green) 55%,var(--green-d));box-shadow:0 20px 44px -18px rgba(63,176,105,.6)}
.result-hero::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.1);top:-80px;right:-60px}
.result-hero .lbl{font-size:13px;opacity:.92;font-weight:600;letter-spacing:.03em;position:relative}
.result-hero .big{font-size:58px;font-weight:800;letter-spacing:-.04em;line-height:1;margin:6px 0 2px;position:relative}
.result-hero .big small{font-size:18px;font-weight:700;opacity:.85;margin-left:5px}
.stat-row{display:flex;gap:11px;margin-bottom:20px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;text-align:center;box-shadow:0 4px 14px -10px rgba(31,42,36,.3)}
.stat .sv{font-size:21px;font-weight:800;letter-spacing:-.02em}
.stat .sl{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.03em}
.sec-title{font-size:13px;color:var(--muted);font-weight:700;margin:0 2px 11px;text-transform:uppercase;letter-spacing:.04em}

/* ---------- PROGRAMS ---------- */
.prog{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:13px;
  cursor:pointer;overflow:hidden;box-shadow:var(--shadow);transition:transform .28s,box-shadow .28s}
.prog:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.prog:active{transform:scale(.98)}
.prog.rec{border:1.5px solid var(--green)}
.prog .rec-badge{position:absolute;top:14px;right:14px;background:var(--green-l);color:var(--green-d);
  font-size:11px;font-weight:700;padding:5px 11px;border-radius:99px;letter-spacing:.01em}
.prog-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.prog-ic{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prog-ic .ic{width:28px;height:28px}
.prog h3{font-size:18px;font-weight:800;letter-spacing:-.02em}
.prog .kcal{font-size:13px;color:var(--muted);font-weight:600;margin-top:1px}
.prog-meta{display:flex;gap:18px;padding-top:13px;border-top:1px solid var(--line)}

/* pick the tier in a category that best fits a kcal value */
function tierForKcal(cat,kcal){
  for(const t of cat.tiers){ if(kcal>=t.lo && kcal<=t.hi) return t; }
  // clamp to nearest edge tier
  if(kcal < cat.tiers[0].lo) return cat.tiers[0];
  return cat.tiers[cat.tiers.length-1];
}

  const el = app.firstElementChild;
  requestAnimationFrame(()=>{ el?.classList.add('active'); });
  attach(cur);
  app.scrollTop=0;
  const sc = app.querySelector('.screen'); if(sc) sc.scrollTop=0;
}

  if(c.gender&&!c.bodyDone){ step='body'; }
  else if(c.gender&&c.bodyDone&&!c.activity){ step='activity'; }
  else if(c.gender&&c.bodyDone&&c.activity&&!c.goal){ step='goal'; }
  const steps=['gender','body','activity','goal'];
  const idx=steps.indexOf(step);
  const pct=((idx+1)/steps.length)*100;
  const head=`<div class="topbar"><div class="back-btn" data-act="calcback">${ic('back')}</div><h2>Расчёт калорий</h2></div>

  if(step==='gender') return head+`

    </div>

  if(step==='activity') return head+`

      ${Object.entries(ACT).map(([k,a],i)=>`<div class="opt ${c.activity===k?'sel':''} fade-up d${i+1}" data-act-level="${k}">
        <div class="o-ic">${ic(a.icon)}</div><div><div>${a.label}</div><div class="o-sub">${a.sub}</div></div></div>`).join('')}

      <div class="opt ${c.goal==='maint'?'sel':''} fade-up d3" data-goal="maint"><div class="o-ic">${ic('equal')}</div><div>Поддержание веса<div class="o-sub">норма без изменений</div></div></div>
      <div class="opt ${c.goal==='gain'?'sel':''} fade-up d4" data-goal="gain"><div class="o-ic">${ic('trend')}</div><div>Набор массы<div class="o-sub">умеренный профицит +12%</div></div></div>
    </div>`;
  return head;
}

function computeCalories(){
  const c=S.calc;
  let bmr = 10*c.weight + 6.25*c.height - 5*c.age + (c.gender==='m'?5:-161);
  let tdee = bmr * ACT[c.activity].k;
  let result = tdee;
  if(c.goal==='loss') result = tdee*0.85;
  if(c.goal==='gain') result = tdee*1.12;
  const floor = c.gender==='f'?1200:1500;
  result = Math.max(result, floor);
  c.bmr=Math.round(bmr); c.tdee=Math.round(tdee); c.result=Math.round(result/10)*10;
  // recommend the "Индивидуальный рацион" category as the default, and the tier matching the kcal
  const cat = CATEGORIES.find(x=>x.id==='individual') || CATEGORIES[0];
  c.recCat = cat;
  c.recTier = tierForKcal(cat, c.result);
}

/* compute order pricing: subtotal, discount, total */
function orderPricing(o){
  const days=o.days||1;
  const subtotal=o.tier.price*days;
  let discountPct=0;
  if(days>=30) discountPct=10; else if(days>=15) discountPct=5;
  // discount does not apply to Деловой пакет
  if(o.cat && o.cat.id==='delovoy') discountPct=0;
  const discountAmt=Math.round(subtotal*discountPct/100);
  const total=subtotal-discountAmt;
  return {subtotal,discountPct,discountAmt,total};
}

function dateFrom(days){const d=new Date();d.setDate(d.getDate()+days);return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();}

function softRender(innerId,builder){
  const inner=document.getElementById(innerId);
  if(!inner){render();return;}
  inner.style.opacity='0';inner.style.transform='translateY(10px)';inner.style.transition='opacity .22s,transform .22s';
  setTimeout(()=>{ inner.innerHTML=builder(); inner.style.opacity='1';inner.style.transform='none';
    attach(S.stack[S.stack.length-1]); },210);
}

/* ---------- order persistence (real "Мои заказы" history) ---------- */
function rawOrders(){ try{ return JSON.parse(localStorage.getItem('ratsion_orders')||'[]'); }catch(e){ return []; } }
function writeOrders(list){ try{ localStorage.setItem('ratsion_orders', JSON.stringify(list.slice(0,20))); }catch(e){} }
/* parse stored "ДД.ММ.ГГГГ" -> Date (or null) */
function parseStoredDate(v){ const m=/^(\d{2})\.(\d{2})\.(\d{4})$/.exec(v||''); if(!m) return null; const d=new Date(+m[3],+m[2]-1,+m[1]); return isNaN(d)?null:d; }
/* load orders, auto-dropping any whose delivery period (start + срок) has fully passed,
   and anything already marked доставлен more than a day ago */
function loadOrders(){
  const today=new Date(); today.setHours(0,0,0,0);
  const kept=rawOrders().filter(od=>{
    const start=parseStoredDate(od.date);
    if(start){ const end=new Date(start); end.setDate(end.getDate()+(od.days||1)); if(end<today) return false; } // period passed → drop
    return true;
  });
  if(kept.length!==rawOrders().length) writeOrders(kept);
  return kept;
}
function saveOrder(rec){ const list=rawOrders(); list.unshift(rec); writeOrders(list); }
function deleteOrder(no){ writeOrders(rawOrders().filter(o=>o.no!==no)); haptic('light'); render(); }
function nextOrderNo(){ let n=+(localStorage.getItem('ratsion_orderseq')||'1041')+1; try{ localStorage.setItem('ratsion_orderseq',String(n)); }catch(e){} return '#'+n; }
/* pull live delivery statuses from the bot for this user's orders, then refresh the screen */
async function syncOrderStatuses(){
  if(!CONFIG.apiBase) return;
  let data=null;
  try{
    const res=await fetch(CONFIG.apiBase.replace(/\/$/,'')+'/my-orders',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ initData:(tg&&tg.initData)||'' })
    });
    if(res.ok) data=await res.json().catch(()=>null);
  }catch(e){ return; }
  if(!data||!data.ok||!Array.isArray(data.orders)) return;
  const byNo={}; data.orders.forEach(o=>{ byNo[o.no]=o.status; });
  let changed=false;
  const list=rawOrders().map(od=>{ const st=byNo[od.no]; if(st&&st!==od.status){ od.status=st; changed=true; } return od; });
  if(changed){ writeOrders(list); if(S.stack[S.stack.length-1]==='orders') render(); }
}

/* submit the current order to the bot, record it, and show the result screen.
   Used by both "Подтвердить заказ" and the "Повторить отправку" retry. */
async function submitOrder(btn){
  const o=S.order; const pr=orderPricing(o);
  const tgUser=(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user)?tg.initDataUnsafe.user:null;
  const payload={
    type:'new_order',
    category:o.cat.name, kcal:o.tier.lo+'-'+o.tier.hi,
    price_per_day:o.tier.price, days:o.days, duration:o.duration,
    subtotal:pr.subtotal, discount_pct:pr.discountPct, discount_amt:pr.discountAmt, total:pr.total,
    date:o.date, address:o.address, name:o.name, phone:o.phone,
    tg_id: tgUser?tgUser.id:null, tg_username: tgUser?tgUser.username:null
  };
  let _lbl;
  if(btn){ btn.disabled=true; _lbl=btn.innerHTML; btn.style.opacity='.7'; btn.innerHTML='Отправляем…'; }

  let delivered=false, orderNo=null, failReason='server';
  if(CONFIG.apiBase){
    // generous timeout so a cold-starting server still has time, but the button
    // can't hang on "Отправляем…" forever if the network is dead
    const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),90000);
    try{
      const res=await fetch(CONFIG.apiBase.replace(/\/$/,'')+'/order',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ initData:(tg&&tg.initData)||'', order:payload }),
        signal:ctrl.signal
      });
      if(res.ok){ const data=await res.json().catch(()=>null);
        if(data&&data.ok&&data.orderNo){ delivered=true; orderNo=data.orderNo; }
        else { failReason='server'; } }
      else { failReason='server'; }   // server reachable but couldn't deliver (e.g. менеджер не нажал «Старт» у бота)
    }catch(e){ failReason = (e&&e.name==='AbortError') ? 'timeout' : 'network'; }
    finally{ clearTimeout(to); }
  } else {
    // legacy degraded mode (no backend configured): try sendData (can't confirm)
    try{ if(tg&&typeof tg.sendData==='function'){ tg.sendData(JSON.stringify(payload)); } }catch(e){}
  }

  if(!orderNo) orderNo=nextOrderNo();      // local fallback number if API didn't assign one
  o.orderNo=orderNo; o.delivered=delivered; o.failReason = delivered?null:failReason;

  // record it locally only once it actually went through, so a failed attempt
  // doesn't leave a stuck "Ожидает отправки" order behind
  if(delivered){
    saveOrder({ no:orderNo, category:o.cat.name, kcal:o.tier.lo+'–'+o.tier.hi,
      duration:o.duration, days:o.days, date:o.date, total:pr.total, ts:Date.now(), status:'Принят' });
    S.hasOrders=true;
  }

  if(btn){ btn.disabled=false; btn.style.opacity=''; btn.innerHTML=_lbl; }
  haptic('heavy');
  go('success');
}

/* parse & validate ДД.ММ.ГГГГ — must be a real calendar date, today..+90 days */
function parseRuDate(v){
  const m=/^(\d{2})\.(\d{2})\.(\d{4})$/.exec(v); if(!m) return null;
  const d=+m[1], mo=+m[2], y=+m[3];
  const dt=new Date(y,mo-1,d);
  if(dt.getFullYear()!==y||dt.getMonth()!==mo-1||dt.getDate()!==d) return null; // rejects 31.02 etc.
  const today=new Date(); today.setHours(0,0,0,0);
  if(dt<today) return null;                                                     // rejects past dates
  const max=new Date(today); max.setDate(max.getDate()+90);
  if(dt>max) return null;                                                       // rejects far-future
  return dt;
}
/* live mask: types "25062026" -> "25.06.2026" */
function maskRuDate(v){ const d=(v||'').replace(/\D/g,'').slice(0,8);
  let out=d.slice(0,2); if(d.length>2) out+='.'+d.slice(2,4); if(d.length>4) out+='.'+d.slice(4,8); return out; }

/* ---------- phone (Uzbekistan +998 + 9 digits, valid operator code) ---------- */
const UZ_CODES=['20','33','50','55','61','62','65','66','67','69','70','71','72','73','74','75','76','77','78','79','88','90','91','93','94','95','97','98','99'];
function phoneDigits(v){ let d=(v||'').replace(/\D/g,''); if(d.startsWith('998')) d=d.slice(3); return d; }
function validUzPhone(v){ const d=phoneDigits(v); return d.length===9 && UZ_CODES.includes(d.slice(0,2)); }
function normUzPhone(v){ return '+998'+phoneDigits(v).slice(0,9); }
/* live mask: formats as "+998 90 123 45 67" while typing */
function fmtUzPhone(v){ const d=phoneDigits(v).slice(0,9);
  let out='+998'; if(d.length) out+=' '+d.slice(0,2); if(d.length>2) out+=' '+d.slice(2,5);
  if(d.length>5) out+=' '+d.slice(5,7); if(d.length>7) out+=' '+d.slice(7,9); return out; }

}

    const c=S.calc;
    if(c.goal){c.goal=null;softRender('calc-inner',calcStep);}
    else if(c.activity){c.activity=null;softRender('calc-inner',calcStep);}
    else if(c.bodyDone){c.bodyDone=false;softRender('calc-inner',calcStep);}
    else if(c.gender){c.gender=null;softRender('calc-inner',calcStep);}
    else back();
  };
  const recalc=app.querySelector('[data-act="recalc"]');
  if(recalc) recalc.onclick=()=>{ S.calc={gender:null,age:S.calc.age,height:S.calc.height,weight:S.calc.weight,activity:null,goal:null,result:null,bmr:0,tdee:0,recCat:null,recTier:null}; render(); };

  app.querySelectorAll('[data-dur]').forEach(el=>el.onclick=()=>{ S.order.duration=el.dataset.dur; S.order.days=parseInt(el.dataset.days)||1; haptic('light'); softRender('order-inner',orderStep); });
  app.querySelectorAll('[data-date]').forEach(el=>el.onclick=()=>{ S.order.date = el.dataset.date==='tomorrow'?dateFrom(1):dateFrom(2); haptic('light'); softRender('order-inner',orderStep); });
  const cDate=document.getElementById('customDate');
  if(cDate) cDate.oninput=()=>{ cDate.value=maskRuDate(cDate.value); };
  const dateNext=app.querySelector('[data-act="datenext"]');
  if(dateNext) dateNext.onclick=()=>{ const v=document.getElementById('customDate').value.trim(); if(!parseRuDate(v)){alert('Введите корректную дату в формате ДД.ММ.ГГГГ\n(от сегодня и не позднее, чем через 90 дней)');return;} S.order.date=v; softRender('order-inner',orderStep); };
  // live input masks on the details step
  const phoneEl=document.getElementById('phone');
  if(phoneEl){
    if(!phoneEl.value.trim()) phoneEl.value='+998 ';
    phoneEl.oninput=()=>{ phoneEl.value=fmtUzPhone(phoneEl.value); };
    phoneEl.onfocus=()=>{ if(!phoneEl.value.trim()) phoneEl.value='+998 '; };
  }
  const detNext=app.querySelector('[data-act="detailsnext"]');
  if(detNext) detNext.onclick=()=>{
    const a=document.getElementById('address').value.trim(), n=document.getElementById('name').value.trim(), p=document.getElementById('phone').value.trim();
    if(a.length<6){alert('Укажите полный адрес доставки (район, улица, дом)');return;}
    if(n.length<2){alert('Укажите имя');return;}
    if(!validUzPhone(p)){alert('Введите корректный номер: +998 и 9 цифр\nнапример +998 90 123 45 67');return;}
    S.order.address=a;S.order.name=n;S.order.phone=normUzPhone(p); haptic('light'); softRender('order-inner',orderStep);
  };
  const orderBack=app.querySelector('[data-act="orderback"]');
  if(orderBack) orderBack.onclick=()=>{
    const o=S.order;
    if(o.address&&o.name&&o.phone&&o.date&&o.duration){ o.address='';o.name='';o.phone='';softRender('order-inner',orderStep); }
    else if(o.date){o.date=null;softRender('order-inner',orderStep);}
    else if(o.duration){o.duration=null;softRender('order-inner',orderStep);}
    else back();
  };
  const place=app.querySelector('[data-act="placeorder"]');
  if(place) place.onclick=()=>submitOrder(place);

  // success screen: retry sending after a failed attempt
  const retry=app.querySelector('[data-act="retryorder"]');
  if(retry) retry.onclick=()=>submitOrder(retry);

  // delete an order from "Мои заказы"
  app.querySelectorAll('[data-del]').forEach(el=>el.onclick=(e)=>{ e.stopPropagation(); deleteOrder(el.dataset.del); });
  // on the orders screen, pull live delivery statuses from the bot
  if(cur==='orders') syncOrderStatuses();

  try{
    if(cur==='menu'){ tg?.BackButton?.hide(); }
    else { tg?.BackButton?.show(); }
  }catch(e){}
}

// register the hardware/Telegram back button ONCE (not per screen — that stacked handlers)
try{ tg?.BackButton?.onClick(()=>back()); }catch(e){}

render();

/* ---------- off-hours notice (Tashkent UTC+5, 09:00–18:00, Sun off) ---------- */
(function(){
  const el=document.getElementById('offhours');
  if(!el) return;
  // Tashkent has no DST; UTC+5 year-round
  const now=new Date();
  const tash=new Date(now.getTime() + (now.getTimezoneOffset()*60000) + (5*3600000));
  const day=tash.getDay();      // 0 = Sunday
  const hr=tash.getHours();
  const closed = (day===0) || (hr<9) || (hr>=18);
  if(closed){
    setTimeout(()=>el.classList.add('show'), 1200);          // appear after loader
    setTimeout(()=>el.classList.remove('show'), 8000);       // auto-hide
  }
  const x=document.getElementById('ohClose');
  if(x) x.onclick=()=>el.classList.remove('show');
})();

/* ---------- Lottie loading screen (event-driven timing) ---------- */
(function(){
  const loader=document.getElementById('loader');
  const brand=document.getElementById('ldBrand');
  const tag=document.getElementById('ldTag');
  const player=document.getElementById('ldLottie');
  if(!loader) return;

  let finished=false;
  function finish(){
    if(finished) return; finished=true;
    // reveal Ratsion + tagline AFTER the handwriting is done
    brand&&brand.classList.add('show');
    setTimeout(()=>{ tag&&tag.classList.add('show'); }, 300);
    // hold a beat so the brand is readable, THEN dissolve into the menu
    setTimeout(()=>{ loader.classList.add('hide'); setTimeout(()=>loader.remove(),600); }, 900);
  }

  // primary: fire when the Lottie animation actually completes
  if(player){
    player.addEventListener('complete', finish);
    player.addEventListener('error', finish);
  }
  // safety net: if the event never fires (CDN blocked, etc.), finish after 5s max
  setTimeout(finish, 5000);
})();
</script>
